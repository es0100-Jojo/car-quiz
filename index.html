<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汽車修護組學科模擬測驗</title>
    <style>
        body { font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #1a73e8; border-bottom: 3px solid #1a73e8; padding-bottom: 15px; }
        .info { text-align: center; background: #e8f0fe; padding: 10px; border-radius: 8px; color: #1967d2; font-weight: bold; margin-bottom: 25px; }
        .question { margin-bottom: 30px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 10px; background: #fff; }
        .question:hover { border-color: #1a73e8; }
        .question-text { font-weight: bold; font-size: 1.15em; margin-bottom: 15px; color: #202124; }
        .options label { display: block; margin: 10px 0; cursor: pointer; padding: 12px; border: 1px solid #f1f3f4; border-radius: 6px; transition: all 0.2s; }
        .options label:hover { background-color: #f8f9fa; border-color: #dadce0; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        button { display: block; width: 100%; padding: 18px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background 0.3s; }
        button:hover { background-color: #1765cc; }
        #result { margin-top: 30px; padding: 25px; display: none; border-radius: 10px; text-align: center; font-size: 1.3em; }
        .pass { background-color: #e6f4ea; color: #137333; border: 1px solid #ceead6; }
        .fail { background-color: #fce8e6; color: #c5221f; border: 1px solid #fad2cf; }
        .wrong-ans { color: #d93025; font-size: 0.95em; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #fad2cf; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚗 汽車修護組學科模擬測驗</h1>
    <p class="info">全隨機模式：題庫隨機抽出 50 題，每題選項順序亦隨機排列<br>每題 2 分，滿分 100 分及格</p>
    
    <div id="quiz-form"></div>
    
    <button onclick="calculateScore()">交卷評分</button>
    
    <div id="result"></div>
    <button id="retry-btn" style="display:none; background-color: #5f6368;" onclick="location.reload()">重新一輪練習</button>
</div>

<script>
// 汽車修護 189題 題庫
const fullBank = [
    { q: "自那一年代開始，政府為解決環保問題而鼓勵廠商研發出噴射引擎機車？", o: ["70年", "80年", "90年", "100年"], a: "70年" },
    { q: "在機車分類中，下列何者是大多數人使用的種類？", o: ["街車", "速克達機車", "嬉皮車", "越野車"], a: "速克達機車" },
    { q: "下列那一種機車是以電瓶當做行駛的動力？", o: ["速克達機車", "跑車", "電動機車", "商用車"], a: "電動機車" },
    { q: "在機車的分類中，除了以廠牌、型式分類中，還有一個很重要的分類就是規格，這裡的規格所指的是", o: ["馬力量", "重量", "油量", "排氣量"], a: "排氣量" },
    { q: "機車以功能來分類時，三陽野狼機車是屬於", o: ["速克達機車", "嬉皮車", "街車", "休旅車"], a: "街車" },
    { q: "機車以功能來分類時，哈雷（Harley Davidson）機車是屬於", o: ["速克達機車", "嬉皮車", "街車", "休旅車"], a: "嬉皮車" },
    { q: "大型重型機車指的是排氣量多少西西以上？", o: ["125", "250", "550", "600"], a: "250" },
    { q: "有關機車的構造，包含那些系統", o: ["引擎系統", "底盤系統", "電路系統", "以上皆是"], a: "以上皆是" },
    { q: "機車基本系統不包括下列那一部分？", o: ["冷氣部分", "底盤部分", "電路部分", "動力部分"], a: "冷氣部分" },
    { q: "二行程引擎每產生一次動力，曲軸轉幾轉？", o: ["1", "2", "3", "4"], a: "1" },
    { q: "四行程引擎每產生一次動力，曲軸轉幾度？", o: ["120", "360", "720", "180"], a: "720" },
    { q: "觸媒轉換器是屬機車動力部分的那一系統？", o: ["引擎本體", "燃料系統", "電路系統", "廢氣排放控制系統"], a: "廢氣排放控制系統" },
    { q: "變速機構是屬於機車底盤部分中的那一個系統", o: ["傳動系統", "煞車系統", "轉向及懸吊系統", "車架與車身"], a: "傳動系統" },
    { q: "提供高壓電給火星塞跳火以點燃汽缸中混合汽的是機車電路中那一系統？", o: ["起動系統", "點火系統", "燈光系統", "充電系統"], a: "點火系統" },
    { q: "發動引擎時，應特別注意工場內的", o: ["照明", "噪音", "通風", "整潔"], a: "通風" },
    { q: "機器腳踏車四行程引擎進氣時吸入汽缸內的為", o: ["純空氣", "混合氣", "汽油", "機油+混合氣"], a: "混合氣" },
    { q: "所謂行程是指", o: ["活塞長度", "汽缸套長度", "汽缸距離（長度）", "活塞在汽缸內位移距離"], a: "活塞在汽缸內位移距離" },
    { q: "引擎的汽缸蓋由鋁合金鑄成，主因是鋁", o: ["熱傳導性佳", "不易變形", "硬度佳", "鋁質承受壓力高於鑄鐵"], a: "熱傳導性佳" },
    { q: "二行程引擎活塞由排氣口關閉上行至上死點止，係為何行程？", o: ["進氣行程", "預壓行程", "壓縮行程", "動力行程"], a: "壓縮行程" },
    { q: "二行程引擎每產生一次動力，曲軸", o: ["轉1轉", "轉2轉", "轉3轉", "轉4轉"], a: "轉1轉" },
    { q: "四行程汽油引擎，活塞上下移動共四次，完成一次循環，曲軸共旋轉", o: ["360度", "720度", "180度", "540度"], a: "720度" },
    { q: "四行程汽油引擎，完成一次循環時，行程的先後次序是", o: ["進氣-壓縮-動力-排氣", "壓縮-排氣-動力-進氣", "排氣-壓縮-動力-進氣", "進氣-排氣-動力-壓縮"], a: "進氣-壓縮-動力-排氣" },
    { q: "活塞在上死點時，活塞頂部與汽缸蓋底部間所形成的空間，稱", o: ["行程", "上死點", "燃燒室", "容積效率"], a: "燃燒室" },
    { q: "引擎中呈現往復直線運動的構件是", o: ["曲軸", "活塞", "變速齒輪", "離合器"], a: "活塞" },
    { q: "目前汽油引擎活塞的材料是", o: ["鋁合金", "鋼", "合金鋼", "鑄鐵"], a: "鋁合金" },
    { q: "所謂引擎是一種燃燒燃料的機構，由", o: ["熱能轉變為機械", "機械能轉變為熱能", "電能轉變為機械", "機械能轉變為電能"], a: "熱能轉變為機械" },
    { q: "四行程引擎吸入適當比例的燃料與空氣之混合氣進入汽缸的行程稱", o: ["進氣行程", "壓縮行程", "動力行程", "排氣行程"], a: "進氣行程" },
    { q: "四行程引擎，曲軸轉一轉，凸輪軸共轉", o: ["180度", "360度", "720度", "540度"], a: "180度" },
    { q: "四行程引擎，曲軸與凸輪軸之轉速比為", o: ["1：1", "1：2", "2：1", "3：1"], a: "2：1" },
    { q: "廢氣之排出是由", o: ["自動衝出", "活塞壓出", "混合氣趕出", "先自動衝出，再由活塞壓出，最後由混合氣趕出"], a: "先自動衝出，再由活塞壓出，最後由混合氣趕出" },
    { q: "下列何者為碟式煞車的優點之一？", o: ["構造複雜", "修理費低", "煞車制動力大", "換煞車油後不需洩放空氣"], a: "煞車制動力大" },
    { q: "有關碟式煞車圓盤上鑽有好多孔，下列敘述何者錯誤？", o: ["清除雜物", "散熱、排水", "減輕重量", "讓煞車制動力變大"], a: "讓煞車制動力變大" },
    { q: "有關碟式油壓煞車，下列敘述何者錯誤？", o: ["煞車油要定期保養", "添加煞車油應保持貯油箱在上、下限之間", "煞車總泵內進油孔較出油孔小", "碟式煞車是利用液體可以傳輸動力原理"], a: "煞車總泵內進油孔較出油孔小" },
    { q: "碟式煞車的來令片磨損，則煞車來令片與煞車盤的間隙會", o: ["變大", "變小", "不變", "不一定"], a: "不變" },
    { q: "有關鼓式煞車系統，下列敘述何者錯誤？", o: ["依鼓式煞車作動可稱為內部擴張式", "與煞車鼓作動通常有兩片煞車來令片", "煞車作動是利用煞車來令片與煞車鼓間的摩擦力", "目前機器腳踏車前輪都採用鼓式煞車"], a: "目前機器腳踏車前輪都採用鼓式煞車" },
    { q: "利用摩擦力，將機器腳踏車的動能變成熱能，散發於空氣中的是", o: ["轉向", "煞車", "懸吊", "避震系統"], a: "煞車" },
    { q: "標示100/90-16 54S之機器腳踏車外胎，其90係指", o: ["高寬比", "輪胎寬度", "輪圈直徑", "輪胎胎壓"], a: "高寬比" },
    { q: "機器腳踏車輪胎規格為3.50-10-4PR，其10表示", o: ["載重量", "輪胎線層數", "輪胎寬度", "輪圈直徑"], a: "輪圈直徑" },
    { q: "下列何者不是直條胎紋的優點？", o: ["對直行行駛容易", "轉彎時防止横向滑行", "驅動力大", "高速行駛，乘坐較舒適，都用於前輪"], a: "驅動力大" },
    { q: "有關輪胎胎壓過高，下列敘述何者正確？", o: ["胎面中央部分的磨損速度較兩邊為快", "騎乘時較為舒適", "會使汽油耗油量增加", "引擎容易過熱"], a: "胎面中央部分的磨損速度較兩邊為快" },
    { q: "輪胎充氣時必須考慮到輪胎溫度，因為輪胎熱時之氣壓比冷時", o: ["高", "低", "不變", "不一定"], a: "高" },
    { q: "有關離合器，下列敘述何者錯誤？", o: ["溼式多片式，其摩擦片比鋼片少一片", "乾式離合器的離合器片不可沾到油", "溼式多片式離合器的作動是經由摩擦力，使動力結合", "乾式離合器片通常有三片"], a: "溼式多片式，其摩擦片比鋼片少一片" },
    { q: "由軸輸出之變速箱動力，能適當傳送或切開的是", o: ["引擎", "變速齒輪移位機構", "離合器", "機油泵浦的功用"], a: "離合器" },
    { q: "變速齒輪移位機構的功用是使後輪產生不同的", o: ["扭力", "轉速", "扭力和轉速", "混合比以適應各種路況需要"], a: "扭力和轉速" },
    { q: "影響前輪轉向操控性的構件", o: ["前避震器", "後避震器", "前輪煞車", "後輪煞車"], a: "前避震器" },
    { q: "機車整個電路系統，不包含下列何者？", o: ["點火系統", "起動系統", "充電系統", "燃料系統"], a: "燃料系統" },
    { q: "下列何種系統的目的在使電瓶保持在充滿電的情況，並提供機車全車用電？", o: ["點火系統", "起動系統", "充電系統", "燈路系統"], a: "充電系統" },
    { q: "提供高壓電給火星塞點火而得到動力的是", o: ["點火系統", "起動系統", "充電系統", "燈路系統"], a: "點火系統" },
    { q: "當引擎靜止時，機車上的電力是由何者提供？", o: ["發電機", "電瓶", "引擎", "起動馬達"], a: "電瓶" },
    { q: "目前機車充電系統使用的均為交流發電機，交流發電機是採用下列那一種方式發電？", o: ["線圈靜止、磁鐵旋轉", "線圈旋轉、磁鐵靜止", "線圈靜止、磁鐵靜止", "線圈旋轉、磁鐵旋轉"], a: "線圈靜止、磁鐵旋轉" },
    { q: "在機車電路中，用來儲存電力的是", o: ["發電機", "電瓶", "引擎", "起動馬達"], a: "電瓶" },
    { q: "CDI點火系統，當火星塞跳火時，主要電容器發什麼功用？", o: ["放電", "充電", "靜止", "保護白金接點"], a: "放電" },

    { q: "用來提供照明的是", o: ["燈路系統", "儀錶系統", "喇叭系統", "點火系統"], a: "燈路系統" },
    { q: "燈路系統不包含下列那一個？", o: ["大燈", "尾燈", "方向燈", "機油燈"], a: "機油燈" },
    { q: "儀錶系統的功用是", o: ["照明用", "指示用", "警告用", "以上皆非"], a: "指示用" },
    { q: "下列哪一個不屬於儀錶系統？", o: ["轉速錶", "油量錶", "指示燈", "方向燈"], a: "方向燈" },
    { q: "喇叭系統的功用是", o: ["照明用", "指示用", "警告用", "以上皆非"], a: "警告用" },

    { q: "何者自1923年發表全世界第一款柴油引擎商用車。", o: ["福特", "裕隆", "朋馳", "BMW"], a: "朋馳" },
    { q: "下列何者不是液化石油氣（LPG）汽車的優點（跟汽油引擎車比）", o: ["省油", "汙染性少", "噪音小", "經濟性佳"], a: "省油" },
    { q: "下列有關電動汽車的敘述何者為誤？", o: ["具有噪音小的優點", "具有無空氣汙染的優點", "可有效減少二氧化碳的排放", "電動汽車的發展，早期是因為馬力較大"], a: "電動汽車的發展，早期是因為馬力較大" },

// 洗牌函式
function shuffle(array) {
    let arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// 隨機抽取 50 題
const selectedQuestions = shuffle(fullBank).slice(0, 50);
const formContainer = document.getElementById('quiz-form');

// 渲染題目與隨機選項
selectedQuestions.forEach((item, index) => {
    let shuffledOptions = shuffle(item.o); // 選擇題打亂選項

    let qDiv = document.createElement('div');
    qDiv.className = 'question';
    qDiv.innerHTML = `
        <div class="question-text">${index + 1}. ${item.q}</div>
        <div class="options">
            ${shuffledOptions.map((opt, i) => `
                <label><input type="radio" name="q${index}" value="${opt}"> ${opt}</label>
            `).join('')}
        </div>
        <div id="ans-${index}" class="wrong-ans" style="display:none"></div>
    `;
    formContainer.appendChild(qDiv);
});

// 批改計分
function calculateScore() {
    let score = 0;
    let unanswered = 0;

    selectedQuestions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const ansDiv = document.getElementById(`ans-${index}`);
        
        if (!selected) {
            unanswered++;
            ansDiv.style.display = 'block';
            ansDiv.innerHTML = `⚠️ 未作答！正確答案是：${item.a}`;
        } else if (selected.value === item.a) {
            score += 2; // 每題 2 分
            ansDiv.style.display = 'none';
        } else {
            ansDiv.style.display = 'block';
            ansDiv.innerHTML = `❌ 答錯了！正確答案是：${item.a}`;
        }
    });

    const resultDiv = document.getElementById('result');
    resultDiv.style.display = 'block';
    
    // 滿分 100 分及格
    resultDiv.className = score >= 100 ? 'pass' : 'fail';
    let msg = score >= 100 ? '🎉 恭喜及格 (滿分)！' : '💪 還差一點，再練習看看！';
    
    resultDiv.innerHTML = `<h2>測驗得分：${score} 分</h2><p>${msg}</p>`;
    
    document.getElementById('retry-btn').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
